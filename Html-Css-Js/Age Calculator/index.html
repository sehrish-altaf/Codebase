<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 align="center">Age Calculator</h1>
    <p align="center">Enter your birth date and today's date, then click Calculate.</p>
    <form align="center">
        <label>
            Birth date:<br>
            <input type="date" name="birthdate" required>
        </label>
        <br><br>
        <label>
            Today's date:<br>
            <input type="date" name="today" required>
        </label>
        <br><br>
        <label>
            Your age (years):<br>
            <input type="number" name="age" placeholder="Age in years" disabled>
        </label>
        <br><br>
        <input type="submit" value="Calculate">
    </form>
</body>
</html>
