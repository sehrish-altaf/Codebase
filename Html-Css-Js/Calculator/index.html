<!DOCTYPE html>
<html>
<head>
    <title> My Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
<h1 > My Calculator </h1> <br>
    <input type="text" class="display" placeholder="Enter no. ">
    <div class="buttons">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>÷</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>×</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>−</button>

        <button class="btn">=</button>
        <button>0</button>
        <button>+</button>
    </div>

</body>
</html>
